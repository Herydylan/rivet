<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE RIVET - L'ÉQUILIBRE PARFAIT</title>
    <link rel="apple-touch-icon" href="icone.png">
    <link rel="icon" type="image/png" href="icone.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Le Rivet">
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #000; color: #fff; text-align: center; padding: 10px; margin: 0; overflow: hidden; }
        .card { background: #111; border: 5px solid #ff4d4d; border-radius: 30px; max-width: 480px; margin: 20px auto; padding: 30px; min-height: 440px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 0 50px rgba(255, 77, 77, 0.7); cursor: pointer; border-top: 20px solid #ff4d4d; position: relative; }
        .text { font-size: 22px; line-height: 1.4; text-transform: uppercase; word-wrap: break-word; }
        .hl { color: #ff4d4d; text-shadow: 0 0 10px #ff4d4d; font-weight: bold; }
        .num { color: #00d4ff; font-size: 38px; font-weight: bold; }
        .fun { color: #00ff88; font-size: 30px; text-shadow: 0 0 15px #00ff88; font-weight: 900; }
        .cumul { color: #ff00ff; font-size: 28px; text-shadow: 0 0 15px #ff00ff; font-weight: 900; }
        .sauce { color: #ff3300; font-size: 32px; text-shadow: 0 0 20px #ff3300; font-weight: 900; animation: pulse 0.8s infinite alternate; }
        .cul-sec { color: #ffcc00; font-size: 42px; text-shadow: 0 0 25px #ffcc00; animation: flash 0.5s infinite alternate; font-weight: 900; }
        .shot { color: #ff0055; font-size: 36px; text-shadow: 0 0 20px #ff0055; font-weight: 900; animation: flash 0.3s infinite alternate; }
        @keyframes flash { from { opacity: 0.4; } to { opacity: 1; } }
        @keyframes pulse { from { transform: scale(0.98); } to { transform: scale(1.02); } }
        .hidden { display: none; }
        input { padding: 18px; width: 80%; border-radius: 12px; border: 2px solid #444; font-size: 18px; margin-bottom: 15px; background: #151515; color: #fff; }
        button { background: #ff4d4d; color: #fff; border: none; padding: 22px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 18px; box-shadow: 0 5px 0 #800; }
        button:active { transform: translateY(3px); box-shadow: none; }
        #count { margin-top: 25px; font-size: 14px; color: #555; letter-spacing: 3px; }
    </style>
</head>
<body>

    <h1 style="color:#ff4d4d; letter-spacing: 8px; margin-top: 20px; text-shadow: 2px 2px #333;">LE RIVET</h1>

    <div id="setup">
        <div class="card" style="min-height: 300px; cursor: default;">
            <h2 style="font-size: 20px; color: #00d4ff; margin-bottom: 20px;">ZONE DE SÉCURITÉ : ENRÔLEMENT</h2>
            <input type="text" id="p-in" placeholder="Prénom..." onkeypress="if(event.key==='Enter') addP()">
            <button onclick="addP()">AJOUTER</button>
            <div id="p-list" style="margin: 20px 0; font-size: 18px; color: #ffcc00; font-weight: bold; min-height: 30px;"></div>
            <button onclick="start()" id="btn-go" class="hidden" style="background:#00d4ff; color:#000; box-shadow: 0 5px 0 #008eb3;">GÉNÉRER LE MIX PARFAIT 🔥</button>
        </div>
    </div>

    <div id="game" class="hidden">
        <div class="card" onclick="draw()">
            <div id="content" class="text">Préparation de la session... Cliquez.</div>
            <div id="count">0 / 35</div>
        </div>
    </div>

    <script>
        let players = [];
        let finalDeck = [];
        let step = 0;
        let totalCardsInGame = 35;

        function addP() {
            let v = document.getElementById('p-in').value.trim();
            if(v) {
                players.push(v);
                document.getElementById('p-list').innerHTML += v + " • ";
                document.getElementById('p-in').value = "";
                if(players.length >= 2) document.getElementById('btn-go').classList.remove('hidden');
            }
        }

        function createDeck() {
            step = 0;
            if (players.length > 3) {
                totalCardsInGame = 35 + ((players.length - 3) * 5);
            } else {
                totalCardsInGame = 35;
            }

            const deckShooters = [
                "ALERTE GÉNÉRALE : Le dernier qui crie 'RIVET' prend un <span class='shot'>SHOOTER</span> pur d'office !",
                "CRIME DE SOBRIÉTÉ : {J1}, tu as l'air beaucoup trop lucide. Prépare et prends un <span class='shot'>SHOOTER</span> immédiatement.",
                "LE JEU DU SHOT : {J1} fait un chifoumi contre {J2}. Le perdant s'enfile un <span class='shot'>SHOOTER</span> sec.",
                "SENTENCE DU DESIGNER : Si tu as du blanc sur tes chaussures, le destin t'as choisi : prends un <span class='shot'>SHOOTER</span>.",
                "VOTE SANCTION : Vote général. Qui capitulera en premier ce soir ? Le plus visé prend un <span class='shot'>SHOOTER</span> cul-sec.",
                "LE SHOT DU DESTIN : Si tu es assis à la gauche de {J1}, prépare un <span class='shot'>SHOOTER</span> et bois-le maintenant.",
                "SÉLECTION AVEUGLE : Tout le monde ferme les yeux. {J1} pointe discrètement quelqu'un du doigt. La victime boit un <span class='shot'>SHOOTER</span> sans savoir qui l'a dénoncée."
            ].sort(() => 0.5 - Math.random());

            const deckSauce = [
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>TOUR DE MANÈGE !</span> {J1} commence à boire, puis son voisin de droite s'y met, puis le suivant... On ne s'arrête que si son voisin de gauche a posé son verre !",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>ROI DU SILENCE !</span> Le premier qui parle ou émet un bruit prend <span class='num'>4</span> gorgées. {J1} gère la fin du silence.",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>LE CHEF D'ORCHESTRE !</span> {J1} doit faire des gestes discrets. Tout le monde doit l'imiter. Le dernier prend <span class='num'>4</span> gorgées !",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> Tout le monde pointe du doigt la personne la plus bordélique. La cible prend autant de gorgées que de votes contre elle.",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>SÉCURITÉ ROUTIÈRE !</span> Tout le monde mime un conducteur. Le dernier qui met ses deux mains sur son volant imaginaire prend <span class='num'>3</span> gorgées.",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>L'AVALANCHE !</span> Tout le monde lève son verre. On boit tous ensemble en continu pendant <span class='num'>5</span> secondes.",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> Vote général : Qui est le plus susceptible de se faire virer d'une boîte ce soir ? Le gagnant boit {N} gorgées.",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>NÉGOCIATION !</span> Mettez-vous d'accord en moins de 15 secondes sur une cible unique pour <span class='num'>5</span> gorgées. Si pas d'accord, tout le monde boit <span class='num'>3</span>.",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>LE NAUTILE !</span> Tout le monde doit toucher le sol avec sa main droite. Le dernier prend <span class='num'>4</span> gorgées.",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>L'ÉGALITÉ !</span> Ceux qui ont le verre le plus rempli doivent boire pour s'aligner sur le niveau du verre le plus vide.",
                "<span class='sauce'>TOUS DANS LA SAUCE :</span> <span class='hl'>LE CRASH !</span> Tout le monde doit mimer un avion. Le dernier qui décolle ses bras prend <span class='num'>3</span> gorgées."
            ].sort(() => 0.5 - Math.random());

            const deckRegles = [
                "<span class='fun'>RÈGLE STRICTE :</span> {J1} n'a plus le droit de dire un seul GROS MOT jusqu'à la fin du jeu. S'il se loupe, le groupe lui écrit le mot SUR LE BRAS AU FEUTRE et il prend <span class='num'>2</span> gorgées.",
                "<span class='fun'>GAGE OBLIGATOIRE :</span> {J1} devient le serveur officiel. C'est lui qui remplit les verres de tout le monde dès qu'ils se vident, jusqu'à la fin de la partie.",
                "<span class='fun'>RÈGLE INFIRMIÈRE :</span> Interdiction de toucher à son téléphone portable. Le premier qui regarde son écran boit <span class='num'>4</span> gorgées.",
                "<span class='fun'>GAGE ACCENT :</span> {J1} doit parler avec un accent étranger au choix jusqu'au prochain tour complet. Oubli ou raté = <span class='num'>3</span> gorgées.",
                "<span class='fun'>RÈGLE DU PRÉNOM :</span> {J2} ne doit plus prononcer aucun prénom. S'il l'oublie, il boit <span class='num'>2</span> à chaque fois.",
                "<span class='fun'>RÈGLE DU TUTOIEMENT :</span> {J1} doit vouvoyer tout le monde. S'il lâche un 'tu', il prend <span class='num'>2</span> gorgées.",
                "<span class='fun'>GAGE T-REX :</span> {J1} doit boire toutes ses gorgées en gardant les coudes collés au corps comme un dinosaure jusqu'à la fin.",
                "<span class='fun'>RÈGLE DE LA MAIN :</span> Tout le monde doit tenir son verre avec sa mauvaise main. Erreur constatée = <span class='num'>2</span> gorgées."
            ].sort(() => 0.5 - Math.random());

            const deckDirectes = [
                "Tous ceux qui ont une cigarette allumée, un vapo ou un briquet à la main boivent {N} gorgées.",
                "Si tu as moins de 50% de batterie sur ton téléphone, prends {N} gorgées d'office.",
                "Tant pis pour toi {J1}, le sort t'a choisi au pif : tu prends {N} gorgées gratuites.",
                "Regardez vos verres. Celui qui a le verre le plus vide boit {N} ou prend un cul-sec pour se remettre à niveau.",
                "Si tu as du noir sur tes fringues, prends {N} gorgées.",
                "Ceux qui ont un iPhone boivent {N}. Les autres distribuent 2 gorgées.",
                "Le plus grand en taille de la pièce distribue {N} gorgées, le plus petit les boit.",
                "Si tu as déjà pris une amende ou perdu des points sur ton permis, bois {N}.",
                "Ceux qui portent des bijoux visibles boivent {N}.",
                "Si tu as les yeux clairs, bois {N}. Si tu as les yeux marrons ou noirs, donne {N}.",
                "La personne assise le plus près de la porte boit {N}.",
                "Ceux qui boivent de l'alcool fort boivent {N}. Les buveurs de bière distribuent {N}.",
                "Le joueur qui a envoyé le dernier message sur son téléphone prend {N} gorgées.",
                "Si tu es en couple, distribue {N} gorgées. Si tu es célibataire, bois-les.",
                "Le premier qui rigole à partir de maintenant prend {N} gorgées.",
                "Ceux qui portent un jean boivent {N}.",
                "Si tu as les cheveux attachés ou un couvre-chef, prends {N} gorgées.",
                "Le joueur qui s'est réveillé le plus tard ce matin distribue {N} gorgées.",
                "Si tu as plus de 2 clés sur ton trousseau de clés, bois {N}.",
                "Ceux qui portent des chaussettes noires boivent {N}.",
                "Si tu as une application de rencontre installée sur ton tel, bois {N}.",
                "Le joueur qui a payé les dernières courses distribue {N} gorgées.",
                "Si tu as mangé un fast-food aujourd'hui, bois {N}.",
                "Si ton prénom commence par une voyelle, prends {N} gorgées.",
                "Le joueur assis sur le siège le moins confortable boit {N}.",
                "Si tu portes une ceinture, distribue {N}. Sinon, bois {N}.",
                "Si tu as un tatouage ou un piercing, prends {N} gorgées.",
                "Le propriétaire des lieux distribue {N} gorgées.",
                "Ceux qui ont fêté leur anniversaire au cours des 6 derniers mois boivent {N}.",
                "Le joueur qui a le plus d'argent en liquide sur lui distribue {N}.",
                "Ceux qui portent du bleu ou du rouge boivent {N}.",
                "Si tu as un animal de compagnie chez toi, distribue {N} gorgées.",
                "Le joueur qui est arrivé le dernier à la soirée prend {N} gorgées.",
                "Ceux qui préfèrent le rhum au whisky boivent {N}.",
                "Le plus vieux de la pièce distribue {N}."
            ].sort(() => 0.5 - Math.random());

            const deckJeuxEtDefis = [
                "JEU DU 21 : À partir de {J1}, comptez jusqu'à 21 dans le sens des aiguilles d'une montre (1, 2 ou 3 chiffres max). Celui qui dit '21' prend {N} gorgées.",
                "BAC À SABLE : À partir de {J1}, citez des marques de voitures. Le premier qui bloque ou répète boit {N}.",
                "RAPIDITÉ : {J2}, cite 4 rappeurs français en moins de 5 secondes ou prends {N}.",
                "LE FLINGUE : Au signal, tout le monde mime un pistolet et vise quelqu'un. Si tu es visé par {J1}, tu bois {N} immédiatement.",
                "PIERRE-FEUILLE-CISEAUX : {J1} fait un chifoumi contre toute la table en même temps. Les perdants prennent {N} gorgées.",
                "JEU DES ALCOOLS : On tourne. Citez des marques d'alcool fort. Le premier qui sèche prend {N}.",
                "CHAÎNE DE MOTS : {J1} dit un mot. Le suivant doit enchaîner avec la dernière lettre. Le premier qui bug boit {N}.",
                "<span class='fun'>DÉFI :</span> {J1}, fais 10 pompes immédiatement ou bois {N2}.",
                "<span class='fun'>DÉFI :</span> {J1} doit raconter sa pire honte ou son pire râteau, ou boire {N2}.",
                "<span class='fun'>DUEL :</span> Duel de regards entre {J1} et {J2}. Le premier qui craque ou rigole prend {N} gorgées.",
                "<span class='fun'>DILEMME :</span> {J1}, soit tu finis ton verre maintenant, soit tu distribues {N2} gorgées à la personne de ton choix.",
                "<span class='fun'>SÉCURITÉ :</span> {J1} donne son téléphone à {J2} qui lit le dernier message reçu à voix haute. Refus = {N2}."
            ].sort(() => 0.5 - Math.random());

            const deckCumul = [
                "<span class='cumul'>CUMUL :</span> {J1}, cite autant de personnages de <span class='hl'>HARRY POTTER</span> que possible en 30s. DISTRIBUE autant de gorgées que ton score !",
                "<span class='cumul'>CUMUL :</span> {J1}, cite autant de personnages du <span class='hl'>SEIGNEUR DES ANNEAUX</span> que possible en 30s. DISTRIBUE autant de gorgées que ton score !",
                "<span class='cumul'>CUMUL :</span> {J1}, cite autant de marques d'alcool ou bières que possible en 30s. DISTRIBUE autant de gorgées !",
                "<span class='cumul'>CUMUL :</span> {J1}, cite autant de clubs de FOOTBALL européens que possible en 30s. DISTRIBUE ton score !",
                "<span class='cumul'>CUMUL :</span> {J1}, cite autant de POKÉMONS que possible en 30s. DISTRIBUE autant de gorgées !",
                "<span class='cumul'>CUMUL :</span> {J1}, cite autant de films MARVEL ou DC en 30s. DISTRIBUE autant de gorgées !",
                "<span class='cumul'>CUMUL :</span> {J1}, cite autant de capitales du monde que possible en 30s. DISTRIBUE ton score !"
            ].sort(() => 0.5 - Math.random());

            const culSecs = [
                "FATALITÉ : {J1}, <span class='cul-sec'>CUL SEC !</span>", 
                "DÉLUGE : {J2}, <span class='cul-sec'>CUL SEC !</span>"
            ];

            let selection = [];
            while (selection.length < (totalCardsInGame - 1)) {
                if (deckDirectes.length > 0) selection.push(deckDirectes.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
                
                if (deckSauce.length > 0) selection.push(deckSauce.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
                
                if (deckJeuxEtDefis.length > 0) selection.push(deckJeuxEtDefis.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
                
                if (deckShooters.length > 0 && Math.random() > 0.3) selection.push(deckShooters.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;

                if (deckRegles.length > 0 && Math.random() > 0.4) selection.push(deckRegles.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;

                if (deckCumul.length > 0 && Math.random() > 0.5) selection.push(deckCumul.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
            }

            selection.push(culSecs[Math.floor(Math.random() * culSecs.length)]);
            finalDeck = selection;
        }

        function start() {
            createDeck();
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            draw();
        }

        function draw() {
            if(step >= totalCardsInGame) {
                document.getElementById('content').innerHTML = "🏁 ARCHIVE TERMINÉE.<br><br><button onclick='location.reload()'>RELANCER UN MIX ENTIÈREMENT NOUVEAU</button>";
                document.getElementById('count').innerText = totalCardsInGame + " / " + totalCardsInGame;
                return;
            }
            let p = [...players].sort(() => 0.5 - Math.random());
            let n = Math.floor(Math.random() * 5) + 2; 
            
            let raw = finalDeck[step];
            let processed = raw.replace(/{J1}/g, '<span class="hl">'+p[0]+'</span>')
                               .replace(/{J2}/g, '<span class="hl">'+(p[1]||p[0])+'</span>')
                               .replace(/{J3}/g, '<span class="hl">'+(p[2]||p[0])+'</span>')
                               .replace(/{N}/g, '<span class="num">'+n+'</span>')
                               .replace(/{N2}/g, '<span class="num">'+(n*2)+'</span>');
            document.getElementById('content').innerHTML = processed;
            document.getElementById('count').innerText = (step + 1) + " / " + totalCardsInGame;
            step++;
        }
    </script>
</body>
</html>
