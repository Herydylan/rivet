<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LE RIVET - MISSION GALACTIQUE</title>
    <link rel="apple-touch-icon" href="icone.png?v=2">
    <link rel="icon" type="image/png" href="icone.png?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Le Rivet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Share+Tech+Mono&display=swap');

        body { 
            font-family: 'Share Tech Mono', monospace; 
            background-color: #020617; 
            background-image: 
                radial-gradient(at 50% 0%, rgba(14, 165, 233, 0.15) 0px, transparent 50%),
                linear-gradient(rgba(14, 165, 233, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            color: #e2e8f0; 
            text-align: center; 
            padding: 15px; 
            margin: 0; 
            overflow: hidden; 
            height: 100vh;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #f8fafc;
            letter-spacing: 6px;
            margin-top: 15px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(14, 165, 233, 0.6);
            font-size: 32px;
        }

        .subtitle {
            font-family: 'Orbitron', sans-serif;
            color: #0ea5e9;
            font-size: 12px;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .card { 
            background: rgba(15, 23, 42, 0.8); 
            border: 2px solid #0ea5e9; 
            border-radius: 20px; 
            max-width: 450px; 
            margin: 0 auto; 
            padding: 25px; 
            min-height: 460px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.25), inset 0 0 20px rgba(14, 165, 233, 0.1); 
            cursor: pointer; 
            position: relative;
            backdrop-filter: blur(10px);
        }

        .card::before, .card::after {
            content: ''; position: absolute; width: 15px; height: 15px; border-color: #f97316; border-style: solid; pointer-events: none;
        }
        .card::before { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
        .card::after { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

        .text { font-size: 21px; line-height: 1.5; text-transform: uppercase; letter-spacing: 1px; }
        
        .hl { color: #38bdf8; text-shadow: 0 0 10px rgba(56, 189, 248, 0.5); font-weight: bold; font-family: 'Orbitron', sans-serif; }
        .num { color: #f43f5e; font-size: 34px; font-weight: bold; font-family: 'Orbitron', sans-serif; }
        
        .fun { color: #a855f7; font-size: 26px; font-family: 'Orbitron', sans-serif; font-weight: 900; text-shadow: 0 0 15px rgba(168, 85, 247, 0.5); }
        .cumul { color: #eab308; font-size: 25px; font-family: 'Orbitron', sans-serif; font-weight: 900; }
        .sauce { color: #34d399; font-size: 26px; font-family: 'Orbitron', sans-serif; font-weight: 900; text-shadow: 0 0 15px rgba(52, 211, 153, 0.4); }
        
        .shot { color: #f97316; font-size: 36px; font-family: 'Orbitron', sans-serif; font-weight: 900; text-shadow: 0 0 25px #f97316; animation: pulse 0.6s infinite alternate; }
        .cul-sec { color: #ef4444; font-size: 38px; font-family: 'Orbitron', sans-serif; font-weight: 900; text-shadow: 0 0 30px #ef4444; animation: pulse 0.3s infinite alternate; }

        @keyframes pulse { from { transform: scale(0.96); opacity: 0.8; } to { transform: scale(1.04); opacity: 1; } }
        
        .hidden { display: none; }
        
        input { 
            padding: 16px; width: 85%; border-radius: 8px; border: 1px solid #334155; 
            font-size: 18px; margin-bottom: 15px; background: #0f172a; color: #fff; 
            font-family: 'Share Tech Mono', monospace; text-align: center; text-transform: uppercase;
        }
        input:focus { outline: none; border-color: #0ea5e9; box-shadow: 0 0 10px rgba(14, 165, 233, 0.5); }
        
        button { 
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); color: #fff; 
            border: none; padding: 20px; border-radius: 8px; font-family: 'Orbitron', sans-serif; 
            font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; 
            font-size: 18px; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3); transition: all 0.2s;
        }
        button:active { transform: scale(0.98); box-shadow: none; }
        
        .launch-btn {
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            box-shadow: 0 4px 20px rgba(14, 165, 233, 0.4);
            font-size: 20px;
            margin-top: 15px;
        }

        #count { margin-top: 20px; font-size: 13px; color: #64748b; letter-spacing: 2px; }
    </style>
</head>
<body>

    <h1>LE RIVET</h1>
    <div class="subtitle">CORPS EXPÉDITIONNAIRE</div>

    <div id="setup">
        <div class="card" style="min-height: 320px; cursor: default;">
            <div style="font-size: 16px; color: #0ea5e9; margin-bottom: 20px; letter-spacing: 2px;">ENREGISTREMENT DE L'ÉQUIPAGE</div>
            <input type="text" id="p-in" placeholder="IDENTIFIANT MEMBRE..." onkeypress="if(event.key==='Enter') addP()">
            <button onclick="addP()">ENRÔLER</button>
            <div id="p-list" style="margin: 20px 0; font-size: 16px; color: #eab308; font-weight: bold; min-height: 30px; letter-spacing: 1px;"></div>
            <button onclick="start()" id="btn-go" class="hidden launch-btn">PRÊT À DÉCOLLER 🚀</button>
        </div>
    </div>

    <div id="game" class="hidden">
        <div class="card" onclick="draw()">
            <div id="content" class="text">Initialisation des systèmes... Touchez l'écran.</div>
            <div id="count">SYSTEM READY</div>
        </div>
    </div>

    <script>
        let players = [];
        let finalDeck = [];
        let step = 0;
        let totalCardsInGame = 35;

        function addP() {
            let inputField = document.getElementById('p-in');
            let v = inputField.value.trim();
            if(v) {
                players.push(v);
                document.getElementById('p-list').innerHTML += v + " • ";
                inputField.value = "";
                if(players.length >= 2) {
                    document.getElementById('btn-go').classList.remove('hidden');
                }
            }
        }

        function createDeck() {
            step = 0;
            totalCardsInGame = players.length > 3 ? 35 + ((players.length - 3) * 5) : 35;

            // TIROIR 1 : LES SHOOTERS
            const deckShooters = [
                "ALERTE RUPTURE DE STOCK : Le dernier membre d'équipage qui touche le plafond prend un <span class='shot'>SHOOTER</span>.",
                "CONDUITE À RISQUE : {J1} est suspecté de sobriété illégale. Prépare et prends un <span class='shot'>SHOOTER</span>.",
                "DUEL AMORTI : {J1} provoque {J2} au chifoumi. Le perdant boit un <span class='shot'>SHOOTER</span> de punition.",
                "RECONNAISSANCE BIOMÉTRIQUE : Si tu portes des chaussures claires, le système te verrouille : prends un <span class='shot'>SHOOTER</span>.",
                "EVALUATION DU COCKPIT : Vote à trois. Qui est le plus proche du crash ce soir ? Le vainqueur encaisse un <span class='shot'>SHOOTER</span>.",
                "PANNE HYDROLIQUE : Le joueur placé immédiatement à la gauche de {J1} doit vider un <span class='shot'>SHOOTER</span>.",
                "INFILTRATION : Tout le monde ferme les yeux. {J1} désigne un suspect du doigt. À l'ouverture, la cible prend un <span class='shot'>SHOOTER</span> sans connaître l'auteur.",
                "RADAR EMBARQUÉ : Le joueur qui a le plus petit niveau de liquide dans son verre prend un <span class='shot'>SHOOTER</span> pour équilibrer.",
                "COMMANDE PASSÉE : {J1} choisit un membre de la table pour lui préparer et lui servir un <span class='shot'>SHOOTER</span> d'amitié forcée.",
                "RATION DE SECOURS : L'équipage vote pour l'officier le plus fatigué. Le gagnant reçoit un <span class='shot'>SHOOTER</span> d'adrénaline."
            ].sort(() => 0.5 - Math.random());

            // TIROIR 2 : PROTOCOLES COLLECTIFS (ALERTE INTEGRALE)
            const deckSauce = [
                "<span class='sauce'>ALERTE INTEGRALE :</span> <span class='hl'>VORTEX CINETIQUE !</span> {J1} commence à boire, son voisin de droite embraye, puis le suivant... Interdiction de poser son verre tant que ton repère de gauche boit !",
                "<span class='sauce'>ALERTE INTEGRALE :</span> <span class='hl'>DEPRESSURISATION COCKPIT !</span> Silence radio total. Le premier qui produit un son ou rit écope de <span class='num'>4</span> gorgées. {J1} valide le retour à la normale.",
                "<span class='sauce'>ALERTE INTEGRALE :</span> <span class='hl'>TRANSMISSION MIROIR !</span> {J1} devient le commandant de bord. Chaque geste qu'il exécute doit être copié. Le dernier équipier à la traîne prend <span class='num'>4</span> gorgées.",
                "<span class='sauce'>ALERTE INTEGRALE :</span> Désignez tous du doigt le passager le plus indiscipliné de la navette. La cible absorbe autant de gorgées que de votes reçus.",
                "<span class='sauce'>ALERTE INTEGRALE :</span> <span class='hl'>GRAVITÉ ZÉRO !</span> Tout le monde doit lever les deux pieds du sol. Le dernier équipier en contact avec la terre ferme prend <span class='num'>3</span> gorgées.",
                "<span class='sauce'>ALERTE INTEGRALE :</span> <span class='hl'>HYPERPROPULSION !</span> Tout le monde lève sa réserve. On consomme tous ensemble en continu pendant <span class='num'>5</span> secondes.",
                "<span class='sauce'>ALERTE INTEGRALE :</span> Vote de bord : Qui risque de se faire éjecter du sas en premier ce soir ? Le condamné boit {N} gorgées.",
                "<span class='sauce'>ALERTE INTEGRALE :</span> <span class='hl'>CONCORDANCE DES SYSTÈMES !</span> Ceux qui possèdent le niveau de réservoir le plus haut boivent jusqu'à s'aligner sur le niveau le plus bas.",
                "<span class='sauce'>ALERTE INTEGRALE :</span> <span class='hl'>ALERTE IMPACT !</span> Tout le monde se protège la tête avec les deux mains. Le dernier officier en position prend <span class='num'>4</span> gorgées.",
                "<span class='sauce'>ALERTE INTEGRALE :</span> <span class='hl'>STATUE DE SÉCURITÉ !</span> Plus personne ne bouge d'un millimètre. Le premier qui flanche ou tremble prend <span class='num'>4</span> gorgées."
            ].sort(() => 0.5 - Math.random());

            // TIROIR 3 : REGLES RADICALES DE VOL
            const deckRegles = [
                "<span class='fun'>AVARIE DE COMM :</span> {J1} subit un brouillage d'ondes : aucun GROS MOT toléré sous peine de prendre <span class='num'>2</span> gorgées et de voir le mot inscrit AU FEUTRE SUR SON BRAS par l'équipage.",
                "<span class='fun'>PROTOCOLE INTENDANCE :</span> {J1} est nomadisé ingénieur de maintenance des verres. C'est lui qui sert tout le monde jusqu'à la fin de la mission.",
                "<span class='fun'>CONCORDANCE DATA :</span> Verrouillage cybernétique. Interdiction de toucher à son téléphone. Le premier qui rompt la règle prend <span class='num'>4</span> gorgées.",
                "<span class='fun'>SÉJOUR ORBITAL :</span> {J1} doit adopter un accent extraterrestre ou étranger crédible jusqu'à la fin de la boucle. Tout oubli coûte <span class='num'>3</span> gorgées.",
                "<span class='fun'>CRYPTAGE NOMINAL :</span> {J2} n'a plus le droit de citer un seul prénom de la table. Erreur d'aiguillage = <span class='num'>2</span> gorgées.",
                "<span class='fun'>FORMALISME SPATIAL :</span> {J1} doit vouvoyer l'intégralité de la station sous peine de prendre <span class='num'>2</span> gorgées par infraction.",
                "<span class='fun'>ATROPHIE MUSCULAIRE :</span> Effet de la gravité : {J1} doit consommer toutes ses gorgées avec les coudes bolqués contre ses flancs jusqu'à la fin de la partie.",
                "<span class='fun'>INVERSION DES COMMANDES :</span> Tout le monde saisit son verre de la main non-dominante. Alerte non-respect = <span class='num'>2</span> gorgées.",
                "<span class='fun'>BOUCHON ATMOSPHÉRIQUE :</span> {J1} n'a plus le droit de poser son verre sur la table. Il doit le garder en main ou le confier à quelqu'un. Oubli = <span class='num'>3</span> gorgées.",
                "<span class='fun'>REGARD FIXE :</span> {J1} doit garder ses yeux fixés sur {J2} à chaque fois qu'il boit une gorgée. Erreur de trajectoire = <span class='num'>2</span> gorgées."
            ].sort(() => 0.5 - Math.random());

            // TIROIR 4 : DILEMMES RETORS
            const deckDilemmes = [
                "<span class='fun'>CHOIX DE TRAJECTOIRE :</span> {J1}, soit tu subis <span class='num'>4</span> gorgées de carburant en solo, soit tu imposes <span class='num'>6</span> gorgées à {J2}... mais tu as l'obligation d'en boire la moitié (<span class='num'>3</span>) avec lui.",
                "<span class='fun'>SACRIFICE DE BORD :</span> {J1}, soit tu prends <span class='num'>3</span> gorgées d'office, soit tu obliges {J2} à boire... mais tu prends exactement la même dose que lui.",
                "<span class='fun'>SÉCURITÉ CORROMPUE :</span> {J1}, donne ton téléphone à {J2} qui lit ton dernier message reçu. Si tu refuses, la station vous inflige <span class='num'>4</span> gorgées CHACUN.",
                "<span class='fun'>PARTAGE DES CHARGES :</span> {J1}, distribue <span class='num'>5</span> gorgées à qui tu veux. Seul problème : tu dois boire le double (<span class='num'>10</span>) pour valider le transfert de cargaison.",
                "<span class='fun'>PILOTAGE SANS SÉCURITÉ :</span> {J1}, soit tu lances un chifoumi contre {J2} (le perdant prend <span class='num'>5</span>), soit vous abandonnez le duel et vous prenez <span class='num'>3</span> chacun sans discuter.",
                "<span class='fun'>ESQUIVE COÛTEUSE :</span> {J1}, distribue un <span class='shot'>SHOOTER</span> à la personne de ton choix. Si la victime l'accepte, ton réservoir se fissure : tu dois immédiatement vider la moitié de ton propre verre en échange."
            ].sort(() => 0.5 - Math.random());

            // TIROIR 5 : LA GRANDE MATRICE DE DÉFIS (60 CARTES DIRECTES UNIQUES)
            const deckDirectes = [
                "Scan des communications : Tous ceux qui possèdent un outil de vape, tabac ou briquet en visuel consomment {N} gorgées.",
                "Niveau d'énergie critique : Si l'autonomie de ton téléphone est inférieure à 50%, encaisse {N} gorgées.",
                "Injustice orbital : {J1}, aucune raison valable. L'ordinateur de bord t'impose {N} gorgées d'office.",
                "Revêtement sombre : Tous les membres équipés d'un vêtement noir consomment {N} gorgées.",
                "Technologie IOS : Ceux qui utilisent un iPhone prennent {N} gorgées. Les utilisateurs Android distribuent 2.",
                "Gabarit de la navette : Le membre le plus grand en taille distribue {N}, le plus petit encaisse la dose.",
                "Historique des infractions : Si tu as déjà perdu des points sur ton permis de navigation terrestre, bois {N}.",
                "Composants précieux : Les porteurs de bijoux métalliques (bague, chaîne, montre) consomment {N}.",
                "Analyse optique : Yeux clairs = encaissez {N} gorgées. Yeux sombres = distribuez {N}.",
                "Sas d'évacuation : L'officier installé le plus près de la porte de la pièce consomme {N}.",
                "Type de fluide : Les buveurs de spiritueux purs prennent {N}. Les adeptes de mousse / bière distribuent {N}.",
                "Activité récente : Le dernier passager à avoir envoyé un message textuel prend {N} gorgées.",
                "Statut civil spatial : Si tu vas dormir en duo ce soir, distribue {N}. Si tu es en dérive solo, bois-les.",
                "Textile standard : Tous les porteurs de jeans subissent {N} gorgées de pressurisation.",
                "Isolation thermique : Ceux qui ont les cheveux attachés ou un couvre-chef prennent {N}.",
                "Séquence de réveil : L'équipier levé le plus tard ce matin distribue {N} gorgées.",
                "Accès sécurisés : Si ton trousseau comporte plus de 2 clés d'accès, consomme {N}.",
                "Réseau de communication : Si une application de rencontre est active sur ton terminal, prends {N}.",
                "Finances spatiales : L'officier qui a réglé le dernier ravitaillement distribue {N} gorgées.",
                "Alimentation synthétique : Si tu as ingéré de la nourriture de fast-food aujourd'hui, prends {N}.",
                "Système d'ancrage : Si tu portes une ceinture, distribue {N}. En cas d'absence, bois {N}.",
                "Modifications corporelles : Les équipiers arborant un tatouage ou un piercing prennent {N}.",
                "Quotas d'anniversaire : Si ta date de naissance tombe sur un mois pair, bois {N}. Impair, distribue.",
                "Réserve de crédit : Le passager détenant le plus de monnaie physique distribue {N}.",
                "Code couleur de vol : Ceux qui arborent du bleu ou du rouge subissent {N} gorgées.",
                "Dernier contact : Le joueur qui a embrassé quelqu'un en dernier boit {N}.",
                "VERIFICATION BIOMETRIQUE : Ceux qui ont des ongles peints ou vernis distribuent {N} gorgées.",
                "OFFICIER DE RÉSERVE : Le joueur qui a le moins parlé depuis le début du vol boit {N} pour se réveiller.",
                "RADAR DE SÉDUCTION : Si tu as déjà couché avec quelqu'un présent à cette table, prends {N} gorgées secrètes.",
                "PILOTE DE LIGNE : Le passager qui a conduit la voiture pour venir ce soir distribue {N} gorgées.",
                "CHARGE DE BATTERIE : L'officier dont le téléphone affiche le plus haut pourcentage distribue {N} gorgées.",
                "SABOTAGE TEXTILE : Tous ceux qui portent des chaussettes blanches prennent {N} gorgées.",
                "SENSEURS THERMIQUES : Si tu es en t-shirt ou débardeur, bois {N}. Si tu as un pull ou une veste, distribue.",
                "CONTRÔLE DE TRANSIT : Le premier joueur qui est allé aux toilettes durant la soirée prend {N} gorgées.",
                "MÉMOIRE HOLOGRAPHIQUE : {J1} doit citer la date d'anniversaire de {J2}. S'il échoue, il prend {N} gorgées.",
                "RÉSEAU SOCIAL : Si tu as posté une story ou une photo aujourd'hui, encaisse {N} gorgées de visibilité.",
                "VÉTÉRAN DE L'ESPACE : Le joueur le plus âgé de la table distribue {N}. Le plus jeune boit la moitié.",
                "VRAI NOMINAL : Si ton prénom se termine par une voyelle, prends {N} gorgées. Une consonne, distribue.",
                "TRAJET DE VOL : Si tu habites à plus de 15 minutes d'ici, le voyage t'épuise : prends {N} gorgées.",
                "MÉTÉO SPATIALE : Si tu as des lunettes de vue ou de soleil sur toi, bois {N} gorgées de correction.",
                "PRODUIT CHIMIQUE : Ceux qui se sont mis du parfum ou du déodorant avant de venir distribuent {N} gorgées.",
                "CAPITAINE DE SOIRÉE : Si tu ne bois pas d'alcool ce soir, distribue {N2} gorgées d'autorité à l'équipage.",
                "VITESSE DE CROISIÈRE : Le joueur qui a son verre le plus rempli boit {N} gorgées pour accélérer le rythme.",
                "PIONNIER DU CODE : {J1}, remercie l'ordinateur de bord à voix haute ou prends {N} gorgées de punition.",
                "DÉGÂTS DES EAUX : Le premier qui fait tomber une goutte à côté de son verre prend {N} gorgées.",
                "FAUSSES COMPAGNY : Si tu as menti à quelqu'un de la table cette semaine, bois {N} gorgées de remords.",
                "FACHÉ AVEC LA LOI : Si tu as déjà eu une amende ou un problème avec la patrouille, prends {N} gorgées.",
                "CULTURE GALACTIQUE : Si tu as été au cinéma au cours des 3 derniers mois, distribue {N} gorgées.",
                "EQUIPEMENT SPORTIF : Tous ceux qui portent des baskets ou des chaussures de sport prennent {N} gorgées.",
                "MAUVAIS ÉLÈVE : L'officier qui a eu la pire note au bac ou à l'école boit {N} gorgées de rattrapage.",
                "SOLDE BANCAIRE : Le joueur qui a le plus d'applications de banque sur son téléphone prend {N} gorgées.",
                "RECONNAISSANCE FACIALE : Si tu as de la barbe ou du maquillage sur le visage, distribue {N} gorgées.",
                "MUSIQUE DE BORD : Le passager qui a choisi la musique qui tourne en fond distribue {N} gorgées.",
                "SANS FIL : Si tu portes des écouteurs sans fil dans tes poches ou sur toi, prends {N} gorgées.",
                "SÉANCE PHOTO : {J1} doit prendre un selfie ridicule avec toute la table ou boire {N} gorgées de honte.",
                "ANIMAL DE COMPAGNIE : Si tu possèdes un chat ou un chien sur ta planète d'origine, distribue {N} gorgées.",
                "TABULATION : Si tu as plus de 10 onglets ouverts sur le navigateur de ton téléphone, bois {N} gorgées.",
                "DÉTOURNEMENT DE FONDS : Le dernier passager à avoir payé un truc sur Lydia/Pumpkin distribue {N} gorgées.",
                "SABOTAGE DE DISCOURS : Le joueur qui a coupé la parole à quelqu'un en dernier prend {N} gorgées.",
                "LIGNE DE CHANCE : Si tu as déjà gagné de l'argent aux jeux de grattage ou au casino, distribue {N}."
            ].sort(() => 0.5 - Math.random());

            // TIROIR 6 : DUELS ET MINI-JEUX
            const deckJeux = [
                "MINI-JEU - MODULE 21 : À partir de {J1}, comptez jusqu'à 21 en orbite (1, 2 ou 3 chiffres max). L'équipier contraint de prononcer '21' prend {N} gorgées.",
                "MINI-JEU - BASE DE DONNÉES : À partir de {J1}, énumérez des constructeurs automobiles. Le premier qui sature ou répète prend {N}.",
                "MINI-JEU - PROPULSION SYNTAXIQUE : {J2}, cite 4 artistes de rap en moins de 5 secondes de chrono sous peine de prendre {N}.",
                "MINI-JEU - TRAJECTOIRE BALISTIQUE : Au signal, tout le monde arme un pistolet visuel vers une cible. Si tu es visé par {J1}, tu prends {N} immédiatement.",
                "MINI-JEU - AFFRONTEMENT ALPHA : {J1} lance un chifoumi général contre toute la table. Tous les perdants prennent {N} gorgées.",
                "MINI-JEU - CARBURANT NOBLE : Rotation de table. Citez des marques de spiritueux (alcools forts). Le premier à court de carburant prend {N}.",
                "MINI-JEU - CHAÎNE RADIALE : {J1} annonce un mot de bord. Le suivant enchaîne avec la dernière lettre. Le premier bug coûte {N} gorgées."
            ].sort(() => 0.5 - Math.random());

            // TIROIR 7 : MATRICE CUMUL
            const deckCumul = [
                "<span class='cumul'>CALCUL DE CHARGE :</span> {J1}, cite un maximum de personnages de la saga <span class='hl'>STAR WARS</span> en 30s. DISTRIBUE autant de gorgées que ton score !",
                "<span class='cumul'>CALCUL DE CHARGE :</span> {J1}, cite un maximum de super-héros en 30s. DISTRIBUE ton score !",
                "<span class='cumul'>CALCUL DE CHARGE :</span> {J1}, énumère autant de marques de bière que possible en 30s. DISTRIBUE la puissance de ton score !",
                "<span class='cumul'>CALCUL DE CHARGE :</span> {J1}, cite un maximum de marques de voitures de sport en 30s. DISTRIBUE ton score à l'équipage.",
                "<span class='cumul'>CALCUL DE CHARGE :</span> {J1}, énumère un maximum de pays de l'espace européen en 30s. DISTRIBUE autant de gorgées !"
            ].sort(() => 0.5 - Math.random());

            const culSecs = [
                "AVARIE MAJEURE : {J1}, <span class='cul-sec'>EJECTER LE RÉSERVOIR (CUL SEC) !</span>", 
                "CRASH COCKPIT : {J2}, <span class='cul-sec'>EJECTER LE RÉSERVOIR (CUL SEC) !</span>"
            ];

            // CONSTRUCTION DU JEU AVEC SELECTION ET SUPPRESSION DES DOUBLONS
            let selection = [];
            while (selection.length < (totalCardsInGame - 1)) {
                if (deckDirectes.length > 0) selection.push(deckDirectes.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
                
                if (deckSauce.length > 0) selection.push(deckSauce.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
                
                if (deckDilemmes.length > 0) selection.push(deckDilemmes.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
                
                if (deckJeux.length > 0) selection.push(deckJeux.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
                
                if (deckShooters.length > 0 && Math.random() > 0.2) selection.push(deckShooters.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;

                if (deckRegles.length > 0 && Math.random() > 0.2) selection.push(deckRegles.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;

                if (deckCumul.length > 0 && Math.random() > 0.4) selection.push(deckCumul.pop());
                if (selection.length >= (totalCardsInGame - 1)) break;
            }

            // Mélange final de la sélection pour casser la structure répétitive
            selection.sort(() => 0.5 - Math.random());

            // Ajout du cul sec tout à la fin
            selection.push(culSecs[Math.floor(Math.random() * culSecs.length)]);
            finalDeck = selection;
        }

        function start() {
            createDeck();
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            draw();
        }

        function draw() {
            if(step >= totalCardsInGame) {
                document.getElementById('content').innerHTML = "🏁 FIN DE MISSION. NAVETTE ARRIVÉE À DESTINATION.<br><br><button onclick='location.reload()'>RELANCER UNE TRAJECTOIRE</button>";
                document.getElementById('count').innerText = "MISSION ACCOMPLISHED";
                return;
            }
            let p = [...players].sort(() => 0.5 - Math.random());
            let n = Math.floor(Math.random() * 4) + 2; 
            
            let raw = finalDeck[step];
            let processed = raw.replace(/{J1}/g, '<span class="hl">'+p[0]+'</span>')
                               .replace(/{J2}/g, '<span class="hl">'+(p[1]||p[0])+'</span>')
                               .replace(/{J3}/g, '<span class="hl">'+(p[2]||p[0])+'</span>')
                               .replace(/{N}/g, '<span class="num">'+n+'</span>')
                               .replace(/{N2}/g, '<span class="num">'+(n*2)+'</span>');

            document.getElementById('content').innerHTML = processed;
            document.getElementById('count').innerText = "VRAI ORBITAL : T-" + (step + 1) + " / " + totalCardsInGame;
            step++;
        }
    </script>
</body>
</html>
